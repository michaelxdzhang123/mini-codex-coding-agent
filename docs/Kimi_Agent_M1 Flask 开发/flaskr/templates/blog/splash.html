{% extends 'base.html' %}

{% block title %}CodeAssist AI{% endblock %}

{% block content %}
<div class="screen splash-screen" id="splashScreen">
    <div class="splash-bg-gradient"></div>
    <div class="splash-particles" id="splashParticles"></div>

    <div class="splash-content" id="splashContent">
        <div class="splash-logo-wrapper">
            <img src="{{ url_for('static', filename='logo_app.png') }}" alt="CodeAssist AI" class="splash-logo-img" onerror="this.style.display='none'">
            <h1 class="splash-title">
                <span class="splash-title-code">&lt;/&gt;</span>
                CodeAssist AI
            </h1>
        </div>
        <p class="splash-tagline">Your Intelligent Coding Partner</p>
        <div class="splash-features">
            <span class="splash-feature">AI Chat</span>
            <span class="splash-dot">&#xb7;</span>
            <span class="splash-feature">Code Gen</span>
            <span class="splash-dot">&#xb7;</span>
            <span class="splash-feature">Light RAG</span>
        </div>
    </div>

    <div class="splash-version">v1.0.0 &mdash; M1</div>
    <div class="splash-loading-bar">
        <div class="splash-loading-fill" id="splashLoadingFill"></div>
    </div>
    <div class="splash-loading-text" id="splashLoadingText">Initializing...</div>
</div>

<script>
(function() {
    const particlesContainer = document.getElementById('splashParticles');
    const fill = document.getElementById('splashLoadingFill');
    const loadingText = document.getElementById('splashLoadingText');
    const content = document.getElementById('splashContent');

    // Create floating particles
    const colors = ['#58A6FF', '#3FB950', '#F0883E', '#A371F7'];
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'splash-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = (2 + Math.random() * 4) + 'px';
        p.style.height = p.style.width;
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.opacity = 0.2 + Math.random() * 0.5;
        p.style.animationDelay = Math.random() * 5 + 's';
        p.style.animationDuration = (4 + Math.random() * 6) + 's';
        particlesContainer.appendChild(p);
    }

    // Entry animation
    setTimeout(() => {
        content.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
        content.style.opacity = '1';
        content.style.transform = 'scale(1) translateY(0)';
    }, 100);

    // Loading bar animation
    const stages = [
        { pct: 20, text: 'Loading modules...' },
        { pct: 45, text: 'Connecting to AI...' },
        { pct: 70, text: 'Indexing documents...' },
        { pct: 90, text: 'Ready!' },
        { pct: 100, text: 'Launching...' }
    ];

    let stageIdx = 0;
    const progressInterval = setInterval(() => {
        if (stageIdx >= stages.length) {
            clearInterval(progressInterval);
            return;
        }
        const s = stages[stageIdx];
        fill.style.width = s.pct + '%';
        loadingText.textContent = s.text;
        stageIdx++;
    }, 400);

    // Auto-advance to menu
    setTimeout(() => {
        document.getElementById('splashScreen').style.transition = 'opacity 0.5s ease';
        document.getElementById('splashScreen').style.opacity = '0';
        setTimeout(() => {
            window.location.href = '{{ url_for("blog.menu") }}';
        }, 500);
    }, 2800);
})();
</script>
{% endblock %}
