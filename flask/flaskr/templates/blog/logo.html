{% extends 'base.html' %}

{% block title %}CodeAssist AI - Loading{% endblock %}

{% block content %}
<div class="screen logo-screen" id="logoScreen">
    <div class="logo-container">
        <div class="logo-text" id="logoText">
            <span class="logo-letter">N</span><span class="logo-letter">E</span><span class="logo-letter">O</span><span class="logo-letter">N</span><span class="logo-letter">&nbsp;</span><span class="logo-letter">F</span><span class="logo-letter">O</span><span class="logo-letter">R</span><span class="logo-letter">G</span><span class="logo-letter">E</span>
        </div>
        <div class="logo-subtitle" id="logoSubtitle">S T U D I O S</div>
    </div>
    <div class="logo-particles" id="logoParticles"></div>
</div>

<script>
(function() {
    const letters = document.querySelectorAll('.logo-letter');
    const subtitle = document.getElementById('logoSubtitle');
    const particlesContainer = document.getElementById('logoParticles');

    // Create particles
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'logo-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 2 + 's';
        p.style.animationDuration = (2 + Math.random() * 3) + 's';
        particlesContainer.appendChild(p);
    }

    // Letter flicker animation
    letters.forEach((letter, i) => {
        letter.style.opacity = '0';
        setTimeout(() => {
            letter.style.transition = 'opacity 0.1s step-end';
            letter.style.opacity = '1';
            // Flicker effect
            setTimeout(() => { letter.style.opacity = '0.3'; }, 50);
            setTimeout(() => { letter.style.opacity = '1'; }, 100);
            setTimeout(() => { letter.style.opacity = '0.6'; }, 130);
            setTimeout(() => { letter.style.opacity = '1'; }, 180);
        }, i * 100 + Math.random() * 200);
    });

    // Subtitle fade in
    setTimeout(() => {
        subtitle.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        subtitle.style.opacity = '1';
        subtitle.style.transform = 'translateY(0)';
    }, letters.length * 100 + 300);

    // Auto-advance to splash
    setTimeout(() => {
        document.getElementById('logoScreen').style.transition = 'opacity 0.5s ease';
        document.getElementById('logoScreen').style.opacity = '0';
        setTimeout(() => {
            window.location.href = '{{ url_for("blog.splash") }}';
        }, 500);
    }, 2500);
})();
</script>
{% endblock %}
